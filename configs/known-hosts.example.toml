# netkit known-hosts — friendly names for IPs and MACs you recognize.
# Copy to known-hosts.toml (gitignored) to use locally, or place at
# ~/.config/netkit/known-hosts.toml for a user-global mapping.
#
# Lookups try IP first, then MAC. Both keys are normalized (lowercase MAC,
# padded octets). Anything you don't list shows up with its raw vendor name.
#
# Optional fields per entry:
#   name    friendly label
#   role    overrides auto-classification (router/gateway, ap/switch/router,
#           camera, printer, nas/file-server, tv/media, iot/mqtt, computer, ...)
#   model   exact model you know but scans can't see (e.g. "Tapo TC40"). Useful
#           for TP-Link gear: cameras, APs and plugs all share the same
#           "CN=TPRI-DEVICE" TLS cert, so the scan can't tell them apart — pin it.
#   uplink  what this host hangs off on the map: another host IP or an
#           infrastructure node id. Lets you draw real links scans can't see —
#           e.g. a Wi-Fi client under its AP, or a mesh node under the main node:
#             "192.168.1.119" = { name = "Phone", uplink = "192.168.1.69" }   # under the Halo AP
#             "192.168.1.70"  = { name = "Halo (Living Room)", role = "ap/switch/router", uplink = "192.168.1.69" }  # mesh backhaul
#   A TP-Link camera, pinned so it stops being guessed as an AP:
#             "192.168.1.42" = { name = "Cámara Taller", role = "camera", model = "Tapo TC40" }

[hosts]
# IP-based entries — useful when devices have a static/DHCP-reserved IP.
"192.168.1.67"  = { name = "desktop-jole",  role = "workstation" }
"192.168.1.98"  = { name = "phoneserver",   role = "ci-hub" }
"192.168.1.96"  = { name = "mediapc",       role = "media-center" }
"192.168.1.115" = { name = "lab-thinkpad",  role = "homelab-node" }
"192.168.1.254" = { name = "router",        role = "gateway" }

# MAC-based entries — survive IP changes (renewed DHCP leases).
# Lowercase the MAC; zero-pad each octet.
# "f0:2f:74:88:01:70" = { name = "desktop-jole", role = "workstation" }
# "10:24:07:4d:fc:9c" = { name = "router-huawei", role = "gateway" }

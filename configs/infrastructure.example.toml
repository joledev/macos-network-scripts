# ============================================================================
# netkit infrastructure — BUILDING TEMPLATE
# ----------------------------------------------------------------------------
# Declare every NON-discoverable network component (no IP / no SNMP that a scan
# can't see): unmanaged switches, patch panels, cable runs, dumb APs, media
# converters, ONT/modem, UPS, etc. `netkit recon` injects these into the map,
# editor, mermaid, .drawio and the NetBox export with REAL parenting
# (host -> access switch -> distribution -> core -> router).
#
# Copy to configs/infrastructure.toml (gitignored) and fill it in floor by floor.
#
# FIELDS
#   id       unique slug, referenced by other nodes' `uplink` — keep it stable
#   name     label shown on the map
#   type     switch | patch-panel | router | ap | modem | media-converter | other
#   model    e.g. "TP-Link TL-SG1016D"
#   speed    e.g. "1 Gbps"  /  "10/100 Mbps"
#   location "Piso 2 / Rack B"   (flows to NetBox site/location)
#   uplink   what it connects UP to: a gateway/host IP, or ANOTHER node id
#   ports    list of host IPs hanging off this node (re-parents them on the map)
#   notes    free text
#
# HOW TO BUILD THE TREE
#   Use `uplink` to chain upward:
#     router (IP)  <-  core-sw  <-  pN-dist  <-  pN-swX  <-  endpoints(ports)
#   Discovered hosts (with an IP) keep getting LABELLED in known-hosts.toml; list
#   their IPs in the relevant switch's `ports` so they sit under it on the map.
#
#   To add a floor: copy a "PISO N" block. To add a closet: copy a switch block.
# ============================================================================


# ---- Building core (uplinks to the ISP router / gateway) -------------------
[[node]]
id       = "core-sw"
name     = "Core / MDF switch"
type     = "switch"
model    = ""
speed    = "1 Gbps"
location = "MDF / Rack principal"
uplink   = "192.168.1.1"          # the building's router/gateway IP
ports    = []
notes    = "Switch troncal del edificio"


# ============================ PISO 1 ========================================
[[node]]
id       = "p1-dist"
name     = "Distribución Piso 1"
type     = "switch"
speed    = "1 Gbps"
location = "Piso 1 / Rack A"
uplink   = "core-sw"
ports    = []

[[node]]
id       = "p1-patch-a"
name     = "Patch panel Piso 1 - Rack A"
type     = "patch-panel"
location = "Piso 1 / Rack A"
uplink   = "p1-dist"

# --- Access switch (REAL example — the one your MacBook plugs into) ---
[[node]]
id       = "p1-sw-sala"
name     = "Switch sala"
type     = "switch"
model    = "TP-Link TL-SF1005D"
speed    = "10/100 Mbps"
location = "Piso 1 / Sala principal"
uplink   = "p1-dist"               # or "192.168.1.1" if it hangs off the router
ports    = ["192.168.1.21", "192.168.1.69"]   # MacBook + Mercusys Halo H50 (AP)
notes    = "5-port Fast Ethernet, unmanaged — caps en7 at 100 Mbps. Replace with gigabit."


# ============================ PISO 2 (copy me per floor) ====================
[[node]]
id       = "p2-dist"
name     = "Distribución Piso 2"
type     = "switch"
speed    = "1 Gbps"
location = "Piso 2 / Rack B"
uplink   = "core-sw"
ports    = []

